# AZIK overrides for macSKK.
#
# This file is appended after macSKK's default kana-rule.conf so later
# definitions win. It intentionally preserves the SKK-style single-key
# bindings for:
# - q: katakana toggle
# - l: abbrev/direct input keybinding
#
# Assumption for this first draft:
# - standalone q/l must remain available for macSKK keybindings
# - suffix uses such as kq / kl should still work because there is pending
#   romaji before q/l
#
# If macSKK ends up intercepting q/l before romaji resolution in your
# environment, the next fallback is to drop the *q / *l AZIK families too.
#
# Omitted on purpose:
# q,ん
# la/li/lu/le/lo
# lya/lyu/lyo
# lz/ln/lk/ld/ll
# lyz/lyn/lyj/lyl
# lq/lh/lw/lp
# lyq/lyh/lyp

